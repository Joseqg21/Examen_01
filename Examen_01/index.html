<!DOCTYPE html>

<html lang="es">


<head>


<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Pokédex</title>



<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">



<!-- Bootstrap Icons -->

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">



<!-- CSS -->

<link rel="stylesheet" href="styles/estilos.css">



</head>





<body>





<!-- ===========================
        ENCABEZADO
============================= -->


<header class="bg-danger text-white shadow">


<div class="container py-3">


<div class="row align-items-center">


<div class="col-md-6">


<h1 class="titulo">


<i class="bi bi-controller"></i>

Pokédex


</h1>


</div>




<div class="col-md-6 text-md-end">



<select id="generacion" class="form-select w-auto d-inline">



<option value="0,151">

Primera Generación

</option>



<option value="151,100">

Segunda Generación

</option>



<option value="251,135">

Tercera Generación

</option>



<option value="386,107">

Cuarta Generación

</option>



<option value="493,156">

Quinta Generación

</option>



</select>



</div>


</div>


</div>


</header>






<!-- ===========================
        MENU PRINCIPAL NUEVO
============================= -->


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">


<div class="container">



<a class="navbar-brand" href="index.html">


<i class="bi bi-controller"></i>

Pokédex


</a>




<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">


<span class="navbar-toggler-icon"></span>


</button>





<div class="collapse navbar-collapse" id="menu">



<div class="navbar-nav ms-auto">




<a class="nav-link active" href="index.html">

Pokémon

</a>




<a class="nav-link" href="entrenadores.html">

Entrenadores

</a>




<a class="nav-link" href="crear_equipo.html">

Crear Entrenador/Equipo

</a>




<a class="nav-link" href="equipos.html">

Equipos Pokémon

</a>



</div>



</div>



</div>


</nav>






<!-- ===========================
              BUSCADOR
============================= -->


<section class="container mt-4">


<div class="row">


<div class="col-md-6 mx-auto">


<input

type="text"

id="buscar"

class="form-control form-control-lg"

placeholder="Buscar Pokémon...">


</div>


</div>


</section>







<!-- ===========================
        MENSAJE CARGANDO
============================= -->


<div id="loading" class="text-center mt-5">



<div class="spinner-border text-danger">


</div>



<h4 class="mt-3">


Cargando Pokédex...


</h4>



</div>







<!-- ===========================
        TARJETAS
============================= -->


<main class="container mt-4">


<div class="row" id="listaPokemon">


</div>


</main>






<!-- ===========================
             MODAL
============================= -->



<div
class="modal fade"
id="pokemonModal"
tabindex="-1">


<div class="modal-dialog modal-lg modal-dialog-centered">



<div class="modal-content">




<div class="modal-header bg-danger text-white">



<h4 id="modalNombre">

Pokémon

</h4>



<button

class="btn-close btn-close-white"

data-bs-dismiss="modal">


</button>



</div>






<div class="modal-body">



<div class="row">




<div class="col-md-4 text-center">



<img

id="modalImagen"

class="img-fluid">


</div>





<div class="col-md-8">




<h5>

Información General

</h5>




<p>

<strong>ID:</strong>

<span id="modalID"></span>

</p>




<p>

<strong>Altura:</strong>

<span id="modalAltura"></span>

</p>




<p>

<strong>Peso:</strong>

<span id="modalPeso"></span>

</p>





<hr>




<h5>

Tipos

</h5>


<div id="modalTipos">


</div>





<hr>



<h5>

Habilidades

</h5>


<div id="modalHabilidades">


</div>





<hr>




<h5>

Movimientos

</h5>


<div id="modalMovimientos">


</div>



</div>



</div>


</div>






<div class="modal-footer justify-content-between">




<button

class="btn btn-primary"

onclick="pokemonAnterior()">



<i class="bi bi-arrow-left"></i>

Anterior


</button>






<button

class="btn btn-danger"

data-bs-dismiss="modal">


Cerrar


</button>





<button

class="btn btn-primary"

onclick="siguientePokemon()">



Siguiente

<i class="bi bi-arrow-right"></i>



</button>





</div>





</div>


</div>


</div>






<!-- Bootstrap -->


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



<!-- JavaScript original -->


<script src="js/script.js"></script>





</body>


</html>
