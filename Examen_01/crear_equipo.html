<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Entrenador y Equipo Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/estilos.css">
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Pokédex</a>
            <div class="navbar-nav">
                <a class="nav-link text-white" href="entrenadores.html">Entrenadores</a>
                <a class="nav-link text-white" href="equipos.html">Equipos</a>
            </div>
        </div>
    </nav>

    <!-- Encabezado -->
    <header class="bg-danger text-white p-4">
        <div class="container">
            <h1>Crear Entrenador y Equipo Pokémon</h1>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="container mt-5">
        <div class="row">
            <!-- Columna Izquierda: Formulario del Entrenador -->
            <div class="col-md-6 mb-4">
                <form id="formEntrenadorEquipo" class="card p-4 shadow">
                    <h3 class="mb-3 text-center">Nuevo Entrenador</h3>

                    <input
                        type="text"
                        id="nombreEntrenador"
                        class="form-control mb-3"
                        placeholder="Nombre del entrenador"
                        required>

                    <input
                        type="text"
                        id="nombreEquipo"
                        class="form-control mb-3"
                        placeholder="Nombre del equipo"
                        required>

                    <div class="mb-3">
                        <label class="form-label">Género del entrenador:</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="sexoEntrenador" id="sexoMasculino" value="Masculino" checked>
                                <label class="form-check-label" for="sexoMasculino">Masculino</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="sexoEntrenador" id="sexFemenino" value="Femenino">
                                <label class="form-check-label" for="sexFemenino">Femenino</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Pueblo o ciudad de origen:</label>
                        <select id="localidadEntrenador" class="form-select">
                            <option value="">-- Seleccionar ubicación --</option>
                            <optgroup label="Kanto (Gen 1)">
                                <option value="Pueblo Paleta">Pueblo Paleta</option>
                                <option value="Pueblo Lavanda">Pueblo Lavanda</option>
                                <option value="Ciudad Verde">Ciudad Verde</option>
                                <option value="Ciudad Plateada">Ciudad Plateada</option>
                                <option value="Ciudad Celeste">Ciudad Celeste</option>
                                <option value="Ciudad Carmín">Ciudad Carmín</option>
                                <option value="Ciudad Azulona">Ciudad Azulona</option>
                                <option value="Ciudad Fucsia">Ciudad Fucsia</option>
                                <option value="Ciudad Azafrán">Ciudad Azafrán</option>
                                <option value="Ciudad Canela">Ciudad Canela</option>
                            </optgroup>
                            <optgroup label="Johto (Gen 2)">
                                <option value="Pueblo Primavera">Pueblo Primavera</option>
                                <option value="Pueblo Azalea">Pueblo Azalea</option>
                                <option value="Pueblo Caoba">Pueblo Caoba</option>
                                <option value="Pueblo Aurico">Pueblo Aurico</option>
                                <option value="Ciudad Cerezo">Ciudad Cerezo</option>
                                <option value="Ciudad Malva">Ciudad Malva</option>
                                <option value="Ciudad Trigal">Ciudad Trigal</option>
                                <option value="Ciudad Iris">Ciudad Iris</option>
                                <option value="Ciudad Olivo">Ciudad Olivo</option>
                                <option value="Ciudad Orquídea">Ciudad Orquídea</option>
                                <option value="Ciudad Endrino">Ciudad Endrino</option>
                            </optgroup>
                            <optgroup label="Hoenn (Gen 3)">
                                <option value="Villa Raíz">Villa Raíz</option>
                                <option value="Pueblo Escaso">Pueblo Escaso</option>
                                <option value="Pueblo Azuliza">Pueblo Azuliza</option>
                                <option value="Pueblo Verdegal">Pueblo Verdegal</option>
                                <option value="Pueblo Pardal">Pueblo Pardal</option>
                                <option value="Pueblo Lavacalda">Pueblo Lavacalda</option>
                                <option value="Pueblo Oromar">Pueblo Oromar</option>
                                <option value="Ciudad Petalia">Ciudad Petalia</option>
                                <option value="Ciudad Férrica">Ciudad Férrica</option>
                                <option value="Ciudad Portual">Ciudad Portual</option>
                                <option value="Ciudad Malvalona">Ciudad Malvalona</option>
                                <option value="Ciudad Arborada">Ciudad Arborada</option>
                                <option value="Ciudad Calagua">Ciudad Calagua</option>
                                <option value="Ciudad Algaria">Ciudad Algaria</option>
                                <option value="Arrecípolis">Arrecípolis</option>
                                <option value="Ciudad Colosalia">Ciudad Colosalia</option>
                            </optgroup>
                            <optgroup label="Sinnoh (Gen 4)">
                                <option value="Pueblo Hojasgemelas">Pueblo Hojasgemelas</option>
                                <option value="Pueblo Arena">Pueblo Arena</option>
                                <option value="Pueblo Aromaflor">Pueblo Aromaflor</option>
                                <option value="Pueblo Caelestis">Pueblo Caelestis</option>
                                <option value="Ciudad Jubileo">Ciudad Jubileo</option>
                                <option value="Ciudad Pirita">Ciudad Pirita</option>
                                <option value="Ciudad Vetusta">Ciudad Vetusta</option>
                                <option value="Ciudad Corazón">Ciudad Corazón</option>
                                <option value="Ciudad Sosiego">Ciudad Sosiego</option>
                                <option value="Ciudad Pradera">Ciudad Pradera</option>
                                <option value="Ciudad Marina">Ciudad Marina</option>
                                <option value="Ciudad Puntaneva">Ciudad Puntaneva</option>
                                <option value="Ciudad Rocavelo">Ciudad Rocavelo</option>
                            </optgroup>
                            <optgroup label="Teselia (Gen 5)">
                                <option value="Pueblo Arcilla">Pueblo Arcilla</option>
                                <option value="Pueblo Arenisca">Pueblo Arenisca</option>
                                <option value="Ciudad Gres">Ciudad Gres</option>
                                <option value="Ciudad Esmalte">Ciudad Esmalte</option>
                                <option value="Ciudad Porcelana">Ciudad Porcelana</option>
                                <option value="Ciudad Mayólica">Ciudad Mayólica</option>
                                <option value="Ciudad Fayenza">Ciudad Fayenza</option>
                                <option value="Ciudad Loza">Ciudad Loza</option>
                                <option value="Ciudad Teja">Ciudad Teja</option>
                                <option value="Ciudad Caolín">Ciudad Caolín</option>
                                <option value="Ciudad Negra">Ciudad Negra</option>
                                <option value="Ciudad Blanca">Ciudad Blanca</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen del entrenador:</label>
                        <div class="d-flex align-items-center gap-3">
                            <img id="previewEntrenador" src="" alt="Vista previa" class="rounded" style="width: 150px; height: 150px; object-fit: contain; border: 3px solid #dc3545;">
                            <button type="button" class="btn btn-outline-secondary" id="btnRealeatorizar">🔄 Cambiar imagen</button>
                        </div>
                    </div>

                    <input type="hidden" id="fotoEntrenador" value="">

                    <button class="btn btn-danger w-100" type="submit">
                        Crear Entrenador y Equipo
                    </button>
                </form>
            </div>

            <!-- Columna Derecha: Selección Manual de Pokémon -->
            <div class="col-md-6 mb-4">
                <div class="card p-4 shadow">
                    <h3 class="mb-3 text-center">Seleccionar Pokémon</h3>
                    <p class="text-muted text-center mb-3">Elige tus Pokémon o usa 🎲 para aleatorio. Si no eliges, quedará en blanco.</p>
                    
                    <div id="pokemon-selectors">
                        <!-- Selector Pokémon 1 -->
                        <div class="mb-3 pokemon-selector">
                            <label class="form-label">Pokémon 1:</label>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Generación:</label>
                                <select class="form-select generacion-slot w-auto" data-slot="0">
                                    <option value="1" selected>Generación 1</option>
                                    <option value="2">Generación 2</option>
                                    <option value="3">Generación 3</option>
                                    <option value="4">Generación 4</option>
                                    <option value="5">Generación 5</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <select class="form-select pokemon-select flex-grow-1" data-slot="0">
                                    <option value="">-- Seleccionar Pokémon --</option>
                                </select>
                                <button type="button" class="btn btn-outline-primary btn-random" data-slot="0">🎲</button>
                            </div>
                            <div class="pokemon-preview mt-2 text-center" id="preview-0"></div>
                        </div>

                        <!-- Selector Pokémon 2 -->
                        <div class="mb-3 pokemon-selector">
                            <label class="form-label">Pokémon 2:</label>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Generación:</label>
                                <select class="form-select generacion-slot w-auto" data-slot="1">
                                    <option value="1" selected>Generación 1</option>
                                    <option value="2">Generación 2</option>
                                    <option value="3">Generación 3</option>
                                    <option value="4">Generación 4</option>
                                    <option value="5">Generación 5</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <select class="form-select pokemon-select flex-grow-1" data-slot="1">
                                    <option value="">-- Seleccionar Pokémon --</option>
                                </select>
                                <button type="button" class="btn btn-outline-primary btn-random" data-slot="1">🎲</button>
                            </div>
                            <div class="pokemon-preview mt-2 text-center" id="preview-1"></div>
                        </div>

                        <!-- Selector Pokémon 3 -->
                        <div class="mb-3 pokemon-selector">
                            <label class="form-label">Pokémon 3:</label>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Generación:</label>
                                <select class="form-select generacion-slot w-auto" data-slot="2">
                                    <option value="1" selected>Generación 1</option>
                                    <option value="2">Generación 2</option>
                                    <option value="3">Generación 3</option>
                                    <option value="4">Generación 4</option>
                                    <option value="5">Generación 5</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <select class="form-select pokemon-select flex-grow-1" data-slot="2">
                                    <option value="">-- Seleccionar Pokémon --</option>
                                </select>
                                <button type="button" class="btn btn-outline-primary btn-random" data-slot="2">🎲</button>
                            </div>
                            <div class="pokemon-preview mt-2 text-center" id="preview-2"></div>
                        </div>

                        <!-- Selector Pokémon 4 -->
                        <div class="mb-3 pokemon-selector">
                            <label class="form-label">Pokémon 4:</label>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Generación:</label>
                                <select class="form-select generacion-slot w-auto" data-slot="3">
                                    <option value="1" selected>Generación 1</option>
                                    <option value="2">Generación 2</option>
                                    <option value="3">Generación 3</option>
                                    <option value="4">Generación 4</option>
                                    <option value="5">Generación 5</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <select class="form-select pokemon-select flex-grow-1" data-slot="3">
                                    <option value="">-- Seleccionar Pokémon --</option>
                                </select>
                                <button type="button" class="btn btn-outline-primary btn-random" data-slot="3">🎲</button>
                            </div>
                            <div class="pokemon-preview mt-2 text-center" id="preview-3"></div>
                        </div>

                        <!-- Selector Pokémon 5 -->
                        <div class="mb-3 pokemon-selector">
                            <label class="form-label">Pokémon 5:</label>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Generación:</label>
                                <select class="form-select generacion-slot w-auto" data-slot="4">
                                    <option value="1" selected>Generación 1</option>
                                    <option value="2">Generación 2</option>
                                    <option value="3">Generación 3</option>
                                    <option value="4">Generación 4</option>
                                    <option value="5">Generación 5</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <select class="form-select pokemon-select flex-grow-1" data-slot="4">
                                    <option value="">-- Seleccionar Pokémon --</option>
                                </select>
                                <button type="button" class="btn btn-outline-primary btn-random" data-slot="4">🎲</button>
                            </div>
                            <div class="pokemon-preview mt-2 text-center" id="preview-4"></div>
                        </div>

                        <!-- Selector Pokémon 6 -->
                        <div class="mb-3 pokemon-selector">
                            <label class="form-label">Pokémon 6:</label>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Generación:</label>
                                <select class="form-select generacion-slot w-auto" data-slot="5">
                                    <option value="1" selected>Generación 1</option>
                                    <option value="2">Generación 2</option>
                                    <option value="3">Generación 3</option>
                                    <option value="4">Generación 4</option>
                                    <option value="5">Generación 5</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <select class="form-select pokemon-select flex-grow-1" data-slot="5">
                                    <option value="">-- Seleccionar Pokémon --</option>
                                </select>
                                <button type="button" class="btn btn-outline-primary btn-random" data-slot="5">🎲</button>
                            </div>
                            <div class="pokemon-preview mt-2 text-center" id="preview-5"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vista previa del equipo -->
        <div class="row mt-4" id="vistaPreviaEquipo" style="display: none;">
            <div class="col-12">
                <h3 class="text-center mb-4">Vista Previa del Equipo</h3>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/indexeddb.js"></script>
    <script src="js/crear_datos.js"></script>
</body>
</html>
